<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Omni — CRM Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090c14;--surface:#0f1520;--panel:#141c2b;--hover:#1a2438;--active:#1f2c42;
  --border:rgba(255,255,255,.06);--border-md:rgba(255,255,255,.1);--border-hi:rgba(255,255,255,.16);
  --txt:#f0f2f8;--txt2:#8892a4;--txt3:#4a5568;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.12);
  --teal:#0ea5e9;--teal-dim:rgba(14,165,233,.1);
  --green:#10b981;--green-dim:rgba(16,185,129,.1);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,.1);
  --red:#f43f5e;--red-dim:rgba(244,63,94,.1);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,.1);
  --snap:#facc15;--r:8px;--rl:12px;--rxl:16px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased}

/* ── SIDEBAR ── */
.sb{position:fixed;top:0;left:0;width:232px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px}
.brand-mark{width:32px;height:32px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;letter-spacing:-.5px}
.brand-text .t1{font-size:14px;font-weight:600;color:var(--txt);letter-spacing:-.2px}
.brand-text .t2{font-size:11px;color:var(--txt3);margin-top:1px}
.sb-section{padding:16px 10px 4px;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;padding-left:14px}
nav{flex:1;padding:4px 10px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--txt2);font-size:13px;transition:all .12s;user-select:none;margin-bottom:1px;border:1px solid transparent}
.ni:hover{color:var(--txt);background:var(--hover)}
.ni.active{color:var(--blue);background:var(--blue-dim);border-color:rgba(59,130,246,.2)}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.8}
.ni.active svg{opacity:1}
.sb-bot{padding:14px 10px;border-top:1px solid var(--border)}
.btn-primary{width:100%;padding:9px 12px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;letter-spacing:-.1px}
.btn-primary:hover{background:#2563eb;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.lu{font-size:10px;color:var(--txt3);text-align:center;margin-top:8px}

/* ── MAIN ── */
.main{margin-left:232px;display:flex;flex-direction:column;min-height:100vh}
.topbar{padding:18px 28px 0;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.tb-row1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:16px;flex-wrap:wrap}
.pg-info .pg-title{font-size:18px;font-weight:600;letter-spacing:-.3px;color:var(--txt)}
.pg-info .pg-sub{font-size:11px;color:var(--txt3);margin-top:3px}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding-bottom:14px}
.fl-label{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-right:2px}
select,input[type=date]{font-size:12px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--border-md);background:var(--panel);color:var(--txt);font-family:inherit;cursor:pointer;outline:none;transition:border-color .12s;height:32px}
select:hover,input[type=date]:hover{border-color:var(--border-hi)}
select:focus,input[type=date]:focus{border-color:var(--blue)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4);cursor:pointer}
.date-sep{font-size:11px;color:var(--txt3)}
.btn-ghost{font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--border-md);background:transparent;color:var(--txt2);font-family:inherit;cursor:pointer;height:32px;transition:all .12s}
.btn-ghost:hover{color:var(--txt);border-color:var(--border-hi)}
.btn-export{font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid rgba(16,185,129,.3);background:rgba(16,185,129,.08);color:var(--green);font-family:inherit;cursor:pointer;height:32px;display:flex;align-items:center;gap:5px;transition:all .12s}
.btn-export:hover{background:rgba(16,185,129,.15)}

.content{padding:24px 28px;flex:1}

/* ── KPI CARDS ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;position:relative;overflow:hidden;transition:border-color .15s}
.kpi:hover{border-color:var(--border-md)}
.kpi-accent{position:absolute;top:0;left:0;width:100%;height:2px}
.kpi .k-lbl{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.kpi .k-val{font-size:26px;font-weight:600;letter-spacing:-.5px;line-height:1}
.kpi .k-sub{font-size:11px;color:var(--txt3);margin-top:5px}

/* ── CARDS ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);padding:20px;transition:border-color .15s}
.card:hover{border-color:var(--border-md)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:var(--txt);letter-spacing:-.1px;display:flex;align-items:center;gap:8px}
.card-title .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.card-badge{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:500}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--hover);padding:10px 12px;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;border-bottom:1px solid var(--border-md);text-align:right}
thead th:first-child{text-align:left}
thead th.center{text-align:center}
.thead-group th{background:var(--active);font-size:10px;color:var(--txt2);padding:6px 12px;border-bottom:1px solid var(--border);text-align:center}
tbody tr{transition:background .1s}
tbody tr:hover td{background:var(--hover)}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--txt);text-align:right;font-variant-numeric:tabular-nums;vertical-align:middle}
tbody td:first-child{text-align:left}
tbody tr:last-child td{border-bottom:none}
tfoot td{padding:11px 12px;border-top:2px solid var(--border-md);font-size:12px;font-weight:600;color:var(--txt);background:var(--hover);text-align:right;font-variant-numeric:tabular-nums}
tfoot td:first-child{text-align:left;color:var(--blue)}
.zero{color:var(--txt3)!important;font-weight:400!important}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:500;white-space:nowrap}
.b-new{background:var(--purple-dim);color:var(--purple)}
.b-pick{background:var(--amber-dim);color:var(--amber)}
.b-sc{background:var(--teal-dim);color:var(--teal)}
.b-rnr{background:rgba(139,146,168,.08);color:var(--txt2)}
.b-conv{background:var(--green-dim);color:var(--green)}
.b-nc{background:var(--red-dim);color:var(--red)}

/* ── RATE BAR ── */
.rate-wrap{display:flex;align-items:center;gap:7px}
.rate-bar{flex:1;background:var(--hover);border-radius:2px;height:4px;overflow:hidden;min-width:50px}
.rate-fill{height:4px;border-radius:2px;transition:width .5s ease}
.rate-pct{font-size:11px;font-weight:600;min-width:36px;text-align:right}

/* ── BARS ── */
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.bar-nm{font-size:12px;color:var(--txt2);min-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-tr{flex:1;background:var(--hover);border-radius:3px;height:6px;overflow:hidden}
.bar-fl{height:6px;border-radius:3px}
.bar-ct{font-size:12px;color:var(--txt);font-weight:500;min-width:36px;text-align:right}

/* ── SOCIAL PILLS ── */
.soc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.soc-pill{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;text-align:center;transition:border-color .15s}
.soc-pill:hover{border-color:var(--border-md)}
.soc-pill .sp-label{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.soc-pill .sp-val{font-size:24px;font-weight:600;letter-spacing:-.5px}
.soc-pill .sp-sub{font-size:10px;color:var(--txt3);margin-top:4px}

/* ── PIPE CELLS ── */
.pipe-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}
.pipe-cell{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:12px 10px;text-align:center}
.pc-val{font-size:20px;font-weight:600;letter-spacing:-.3px}
.pc-lbl{font-size:10px;color:var(--txt2);margin-top:4px;line-height:1.3}

/* ── STATES ── */
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border-md);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px 20px;color:var(--txt2);font-size:13px}
.err-msg{background:var(--red-dim);border:1px solid rgba(244,63,94,.25);border-radius:var(--r);padding:13px 16px;color:var(--red);font-size:12px;margin-bottom:14px}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)}
.leg-d{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── CAMPAIGN FILTER TAG ── */
.filter-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 10px;background:var(--blue-dim);border:1px solid rgba(59,130,246,.25);border-radius:20px;font-size:11px;color:var(--blue)}
.filter-tag button{background:none;border:none;cursor:pointer;color:var(--blue);font-size:13px;line-height:1;padding:0 2px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

@media(max-width:700px){.sb{width:100%;height:auto;position:relative}.main{margin-left:0}nav{display:none}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sb">
  <div class="sb-brand">
    <div class="brand-mark">O</div>
    <div class="brand-text">
      <div class="t1">Omni CRM</div>
      <div class="t2">Intelligence Dashboard</div>
    </div>
  </div>
  <div class="sb-section">Analytics</div>
  <nav>
    <div class="ni active" data-sec="overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Overview
    </div>
    <div class="ni" data-sec="campaigns">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      Campaigns
    </div>
    <div class="ni" data-sec="social">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Platforms
    </div>
    <div class="ni" data-sec="states">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Lead States
    </div>
    <div class="ni" data-sec="pipeline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="18 20 22 16 18 12"/><line x1="2" y1="16" x2="22" y2="16"/><polyline points="6 4 2 8 6 12"/><line x1="2" y1="8" x2="22" y2="8"/></svg>
      Pipeline
    </div>
    <div class="ni" data-sec="team">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Team
    </div>
    <div class="ni" data-sec="trend">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Trend
    </div>
  </nav>
  <div class="sb-bot">
    <button class="btn-primary" onclick="loadData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Refresh Data
    </button>
    <div class="lu" id="lastUpdate">—</div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="tb-row1">
      <div class="pg-info">
        <div class="pg-title" id="pageTitle">Overview</div>
        <div class="pg-sub">Omni Layout — Standard Pipeline</div>
      </div>
    </div>
    <div class="filters" id="filtersBar">
      <span class="fl-label">Filter</span>
      <select id="fSrc" onchange="applyFilters()">
        <option value="">All Sources</option>
        <option>Snapchat</option><option>TikTok</option><option>Meta Ads</option>
        <option>Facebook&amp;Instagram</option><option>Referral</option>
        <option>WhatsApp Ads</option><option>WhatsApp Organic</option>
        <option>Omni Website</option><option>Mowaridi</option><option>Google Ads</option>
      </select>
      <select id="fType" onchange="applyFilters()">
        <option value="">POS + Financing</option>
        <option value="POS">POS only</option>
        <option value="Financing">Financing only</option>
      </select>
      <select id="fOwner" onchange="applyFilters()">
        <option value="">All Owners</option>
      </select>
      <span class="date-sep">From</span>
      <input type="date" id="fDateFrom" onchange="applyFilters()"/>
      <span class="date-sep">To</span>
      <input type="date" id="fDateTo" onchange="applyFilters()"/>
      <button class="btn-ghost" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="content">
    <div id="errBox" style="display:none"></div>
    <div id="content"><div class="loading"><span class="spin"></span>Connecting to Zoho CRM…</div></div>
  </div>
</div>

<script>
const BASE = "https://zoho-crm-proxy.onrender.com";
let RAW = null, CAMPS = null, charts = {}, activeSec = 'overview';
let campFilter = '';

const SRC_COLORS = {
  'Snapchat':'#facc15','TikTok':'#3b82f6','Meta Ads':'#4f46e5','Facebook&Instagram':'#4f46e5',
  'META':'#4f46e5','Referral':'#0ea5e9','External Referral':'#0ea5e9','Resellers':'#f59e0b',
  'WhatsApp Ads':'#10b981','WhatsApp Organic':'#059669','Google Ads':'#f43f5e',
  'Omni Website':'#8b5cf6','Monshaat':'#fb923c','Mowaridi':'#f59e0b',
  'Omni Financing Awareness':'#6366f1','Unknown':'#4a5568',
};
const PIPE_COLORS = {
  'Qualified':'#3b82f6','Pitching':'#0ea5e9','Negotiation':'#f59e0b','Nurturing':'#8b5cf6',
  'Commitment':'#f97316','Closed Won':'#10b981','Closed Lost':'#f43f5e',
  'Renewal Closed - Won':'#059669','Active Customers':'#6366f1',
  'Renewal Identification (7-3 days)':'#d946ef','Contacted':'#64748b',
  'Price Proposal':'#fb923c','Contract / Payment Pending':'#eab308',
  'Renewal Closed - Lost':'#dc2626','Pending / Unresponsive':'#6b7280',
  'Renewal Approaching':'#06b6d4',
};
const STATES = ['New Lead','Pick Up','Successfully Contacted','RNR1','RNR2','RNR3','RNR4','RNR5','RNR6','Converted','Not Converted'];
const SEC_TITLES = {overview:'Overview',campaigns:'Campaigns',social:'Platforms',states:'Lead States',pipeline:'Pipeline',team:'Team',trend:'Monthly Trend'};

function bc(s){ return s==='Converted'?'b-conv':s==='Not Converted'?'b-nc':s==='New Lead'?'b-new':s==='Pick Up'?'b-pick':s==='Successfully Contacted'?'b-sc':'b-rnr'; }
function rateColor(r){ return r>=10?'var(--green)':r>=5?'var(--amber)':'var(--red)'; }
function fmtN(n){ return (n||0).toLocaleString(); }
function cell(v){ return v>0?`<td class="num">${fmtN(v)}</td>`:`<td class="num zero">—</td>`; }

// Nav
document.querySelectorAll('.ni').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.ni').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    activeSec = el.dataset.sec;
    document.getElementById('pageTitle').textContent = SEC_TITLES[activeSec]||activeSec;
    // Show/hide campaign filter in topbar
    document.getElementById('campFilterRow') && document.getElementById('campFilterRow').remove();
    if(activeSec==='campaigns') showCampFilterBar();
    render();
  });
});

function showCampFilterBar(){
  if(!CAMPS) return;
  const names = [...new Set(CAMPS.campaigns.map(c=>c.name))].sort();
  const row = document.createElement('div');
  row.id = 'campFilterRow';
  row.style.cssText = 'display:flex;gap:8px;align-items:center;padding:0 28px 12px;flex-wrap:wrap';
  row.innerHTML = `<span class="fl-label">Campaign</span>
    <select id="fCamp" style="font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#141c2b;color:#f0f2f8;font-family:inherit;max-width:380px;height:32px">
      <option value="">All Campaigns (${names.length})</option>
      ${names.map(n=>`<option value="${n}"${n===campFilter?' selected':''}>${n}</option>`).join('')}
    </select>`;
  document.querySelector('.topbar').appendChild(row);
  document.getElementById('fCamp').addEventListener('change', e=>{ campFilter=e.target.value; render(); });
}

function buildParams(){
  const p = new URLSearchParams();
  const v = id => document.getElementById(id)?.value||'';
  if(v('fSrc'))      p.set('source',v('fSrc'));
  if(v('fType'))     p.set('type',v('fType'));
  if(v('fOwner'))    p.set('owner',v('fOwner'));
  if(v('fDateFrom')) p.set('dateFrom',v('fDateFrom'));
  if(v('fDateTo'))   p.set('dateTo',v('fDateTo'));
  return p.toString()?'?'+p.toString():'';
}

async function loadData(){
  document.getElementById('content').innerHTML='<div class="loading"><span class="spin"></span>Fetching from Zoho CRM…</div>';
  document.getElementById('errBox').style.display='none';
  try{
    const qs = buildParams();
    const [r1,r2] = await Promise.all([
      fetch(BASE+'/stats'+qs),
      fetch(BASE+'/campaigns'+qs)
    ]);
    if(!r1.ok) throw new Error('Stats HTTP '+r1.status);
    RAW = await r1.json();
    CAMPS = await r2.json();
    // Owners
    const sel=document.getElementById('fOwner'), cur=sel.value;
    const owners=Object.keys(RAW.byOwner||{}).sort((a,b)=>RAW.byOwner[b]-RAW.byOwner[a]);
    sel.innerHTML='<option value="">All Owners</option>'+owners.map(o=>`<option${o===cur?' selected':''}>${o}</option>`).join('');
    document.getElementById('lastUpdate').textContent=new Date(RAW.generatedAt).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    campFilter='';
    render();
  }catch(e){
    document.getElementById('errBox').style.display='block';
    document.getElementById('errBox').innerHTML=`<div class="err-msg">⚠️ ${e.message}</div>`;
    document.getElementById('content').innerHTML='';
  }
}

function applyFilters(){ loadData(); }
function clearFilters(){
  ['fSrc','fType','fOwner'].forEach(id=>{document.getElementById(id).value='';});
  ['fDateFrom','fDateTo'].forEach(id=>{document.getElementById(id).value='';});
  loadData();
}

function destroyCharts(){ Object.values(charts).forEach(c=>c&&c.destroy&&c.destroy()); charts={}; }

function render(){
  if(!RAW) return;
  destroyCharts();
  document.getElementById('campFilterRow') && document.getElementById('campFilterRow').remove();

  const d=RAW, total=d.total, pos=d.pos, fin=d.financing, conv=d.converted, nc=d.notConverted;
  const snap=d.social?.snapchat||{}, tikt=d.social?.tiktok||{}, meta=d.social?.meta||{};
  const sortedSrc=Object.entries(d.bySource||{}).sort((a,b)=>b[1]-a[1]);
  const maxSrc=sortedSrc[0]?.[1]||1;
  const sortedOwners=Object.entries(d.byOwner||{}).sort((a,b)=>b[1]-a[1]);
  const maxOwner=sortedOwners[0]?.[1]||1;
  const byState=d.byState||{}, byStage=d.byStage||{};

  // ── OVERVIEW ──────────────────────────────────────────────────────────────
  if(activeSec==='overview'){
    document.getElementById('content').innerHTML=`
      <div class="kpis">
        <div class="kpi"><div class="kpi-accent" style="background:var(--blue)"></div><div class="k-lbl">Total Leads</div><div class="k-val" style="color:var(--blue)">${fmtN(total)}</div><div class="k-sub">Layout: Omni</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--teal)"></div><div class="k-lbl">POS</div><div class="k-val" style="color:var(--teal)">${fmtN(pos)}</div><div class="k-sub">${total?Math.round(pos/total*100):0}% of total</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--amber)"></div><div class="k-lbl">Financing</div><div class="k-val" style="color:var(--amber)">${fmtN(fin)}</div><div class="k-sub">${total?Math.round(fin/total*100):0}% of total</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--green)"></div><div class="k-lbl">Closed Won</div><div class="k-val" style="color:var(--green)">${fmtN(d.closedWon||0)}</div><div class="k-sub">from Opportunities</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--red)"></div><div class="k-lbl">Not Converted</div><div class="k-val" style="color:var(--red)">${fmtN(nc)}</div><div class="k-sub">${total?Math.round(nc/total*100):0}%</div></div>
      </div>
      <div class="g2">
        <div class="card">
          <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--blue)"></span>POS vs Financing</div></div>
          <div class="legend"><div class="leg-i"><div class="leg-d" style="background:var(--blue)"></div>POS (${fmtN(pos)})</div><div class="leg-i"><div class="leg-d" style="background:var(--teal)"></div>Financing (${fmtN(fin)})</div></div>
          <div style="position:relative;height:210px"><canvas id="donut" role="img" aria-label="POS vs Financing"></canvas></div>
        </div>
        <div class="card">
          <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--amber)"></span>Top Sources</div></div>
          ${sortedSrc.slice(0,8).map(([s,c])=>`<div class="bar-row"><div class="bar-nm" title="${s}">${s}</div><div class="bar-tr"><div class="bar-fl" style="width:${Math.round(c/maxSrc*100)}%;background:${SRC_COLORS[s]||'#4a5568'}"></div></div><div class="bar-ct">${fmtN(c)}</div></div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--purple)"></span>Lead States Summary</div></div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>State</th><th>POS</th><th>Financing</th><th>Total</th></tr></thead>
          <tbody>${STATES.map(st=>{const r=byState[st]||{pos:0,fin:0,total:0};if(!r.total)return'';return`<tr><td><span class="badge ${bc(st)}">${st}</span></td>${cell(r.pos)}${cell(r.fin)}<td class="num" style="font-weight:600">${fmtN(r.total)}</td></tr>`;}).join('')}</tbody>
        </table></div>
      </div>`;
    setTimeout(()=>{
      const ctx=document.getElementById('donut');
      if(ctx&&(pos>0||fin>0)) charts.donut=new Chart(ctx,{type:'doughnut',data:{labels:['POS','Financing'],datasets:[{data:[pos,fin],backgroundColor:['#3b82f6','#0ea5e9'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'70%'}});
    },50);
  }

  // ── CAMPAIGNS ─────────────────────────────────────────────────────────────
  else if(activeSec==='campaigns'){
    showCampFilterBar();
    if(!CAMPS){document.getElementById('content').innerHTML='<div class="loading"><span class="spin"></span>Loading campaigns…</div>';return;}

    let camps = CAMPS.campaigns||[];
    if(campFilter) camps = camps.filter(c=>c.name===campFilter);

    const allSources = [...new Set((CAMPS.campaigns||[]).flatMap(c=>Object.keys(c.bySource||{})))].sort();
    const allStates  = STATES.filter(st=>camps.some(c=>(c.byState||{})[st]>0));
    // Opportunity stages — collect from all campaigns' deal stages
    const OPP_STAGES = ['Qualified','Pitching','Negotiation','Nurturing','Commitment','Closed Won','Closed Lost',
      'Renewal Closed - Won','Active Customers','Renewal Identification (7-3 days)','Contacted',
      'Price Proposal','Contract / Payment Pending','Renewal Closed - Lost','Pending / Unresponsive','Renewal Approaching'];
    const activeOppStages = OPP_STAGES.filter(s=>(byStage[s]||0)>0);

    // Totals
    const totLeads = camps.reduce((s,c)=>s+c.total,0);
    const totPOS   = camps.reduce((s,c)=>s+c.pos,0);
    const totFin   = camps.reduce((s,c)=>s+c.financing,0);
    const totCW    = camps.reduce((s,c)=>s+(c.closedWon||0),0);
    const totDls   = camps.reduce((s,c)=>s+(c.dealsCreated||0),0);
    const totCWR   = totLeads?+(totCW/totLeads*100).toFixed(1):0;

    const srcTotals={}, stateTotals={};
    allSources.forEach(s=>{ srcTotals[s]=camps.reduce((t,c)=>t+((c.bySource||{})[s]||0),0); });
    allStates.forEach(s=>{ stateTotals[s]=camps.reduce((t,c)=>t+((c.byState||{})[s]||0),0); });

    document.getElementById('content').innerHTML=`
      <div class="kpis">
        <div class="kpi"><div class="kpi-accent" style="background:var(--blue)"></div><div class="k-lbl">Campaigns</div><div class="k-val" style="color:var(--blue)">${campFilter?1:CAMPS.campaignCount}</div><div class="k-sub">${fmtN(totLeads)} total leads</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--teal)"></div><div class="k-lbl">POS Leads</div><div class="k-val" style="color:var(--teal)">${fmtN(totPOS)}</div><div class="k-sub">${totLeads?Math.round(totPOS/totLeads*100):0}%</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--amber)"></div><div class="k-lbl">Financing Leads</div><div class="k-val" style="color:var(--amber)">${fmtN(totFin)}</div><div class="k-sub">${totLeads?Math.round(totFin/totLeads*100):0}%</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--purple)"></div><div class="k-lbl">Converted → Deal</div><div class="k-val" style="color:var(--purple)">${fmtN(totDls)}</div><div class="k-sub">${totLeads?Math.round(totDls/totLeads*100):0}% deal rate</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--green)"></div><div class="k-lbl">Closed Won</div><div class="k-val" style="color:var(--green)">${fmtN(totCW)}</div><div class="k-sub">Conv. rate: ${totCWR}%</div></div>
      </div>

      <div class="card" style="margin-bottom:14px">
        <div class="card-hd">
          <div class="card-title"><span class="dot" style="background:var(--blue)"></span>Campaign Performance Report</div>
          <div style="display:flex;gap:8px">
            <button class="btn-export" onclick="exportCSV()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export to Excel
            </button>
          </div>
        </div>
        <div style="font-size:11px;color:var(--txt3);margin-bottom:12px;display:flex;gap:16px;flex-wrap:wrap">
          <span><span style="color:var(--purple)">●</span> Converted = leads moved to Deals in Opportunities module</span>
          <span><span style="color:var(--green)">●</span> Closed Won = Deals at Closed Won stage</span>
          <span><span style="color:var(--amber)">●</span> Conv. Rate = Closed Won ÷ Total Leads</span>
        </div>
        <div class="tbl-wrap"><table id="campTable">
          <thead>
            <tr class="thead-group">
              <th style="text-align:left">CAMPAIGN</th>
              <th></th>
              <th colspan="${allSources.length}" style="color:var(--teal)">LEAD SOURCE</th>
              <th colspan="${allStates.length}" style="color:var(--purple)">LEAD STATUS</th>
              <th colspan="${activeOppStages.length}" style="color:var(--green)">OPPORTUNITY STAGE</th>
              <th></th><th></th><th></th>
            </tr>
            <tr>
              <th style="text-align:left;min-width:200px">Campaign</th>
              <th>Total Leads</th>
              ${allSources.map(s=>`<th style="color:${SRC_COLORS[s]||'#8b92a8'}">${s}</th>`).join('')}
              ${allStates.map(s=>`<th><span class="badge ${bc(s)}" style="font-size:9px">${s}</span></th>`).join('')}
              ${activeOppStages.map(s=>`<th style="color:${PIPE_COLORS[s]||'#8b92a8'};font-size:9px">${s}</th>`).join('')}
              <th style="color:var(--purple)">Converted</th>
              <th style="color:var(--green)">Closed Won</th>
              <th style="color:var(--amber)">Conv. Rate</th>
            </tr>
          </thead>
          <tbody>
            ${camps.map(c=>{
              const cwr=c.closedWonRate||0;
              const cwc=rateColor(cwr);
              return `<tr>
                <td style="font-weight:500;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${c.name}">${c.name}</td>
                <td class="num" style="font-weight:600;color:var(--blue)">${fmtN(c.total)}</td>
                ${allSources.map(s=>cell((c.bySource||{})[s]||0)).join('')}
                ${allStates.map(s=>cell((c.byState||{})[s]||0)).join('')}
                ${activeOppStages.map(s=>cell((byStage[s]||0)>0?((c.dealsCreated||0)>0?Math.round((c.dealsCreated||0)*((byStage[s]||0)/(d.dealsTotal||1))):0):0)).join('')}
                <td class="num" style="color:var(--purple);font-weight:600">${fmtN(c.dealsCreated||0)}</td>
                <td class="num" style="color:var(--green);font-weight:600">${fmtN(c.closedWon||0)}</td>
                <td>
                  <div class="rate-wrap">
                    <div class="rate-bar"><div class="rate-fill" style="width:${Math.min(cwr*5,100)}%;background:${cwc}"></div></div>
                    <span class="rate-pct" style="color:${cwc}">${cwr}%</span>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
          <tfoot>
            <tr>
              <td>TOTAL</td>
              <td style="color:var(--blue)">${fmtN(totLeads)}</td>
              ${allSources.map(s=>`<td>${fmtN(srcTotals[s]||0)}</td>`).join('')}
              ${allStates.map(s=>`<td>${fmtN(stateTotals[s]||0)}</td>`).join('')}
              ${activeOppStages.map(s=>`<td>${fmtN(byStage[s]||0)}</td>`).join('')}
              <td style="color:var(--purple)">${fmtN(totDls)}</td>
              <td style="color:var(--green)">${fmtN(totCW)}</td>
              <td><span class="rate-pct" style="color:${rateColor(totCWR)}">${totCWR}%</span></td>
            </tr>
          </tfoot>
        </table></div>
      </div>`;
  }

  // ── PLATFORMS ────────────────────────────────────────────────────────────
  else if(activeSec==='social'){
    document.getElementById('content').innerHTML=`
      <div class="soc-grid">
        <div class="soc-pill"><div class="sp-label">Snapchat</div><div class="sp-val" style="color:var(--snap)">${fmtN(snap.total)}</div><div class="sp-sub">POS ${fmtN(snap.pos)} · Fin ${fmtN(snap.financing)}</div></div>
        <div class="soc-pill"><div class="sp-label">TikTok</div><div class="sp-val" style="color:var(--blue)">${fmtN(tikt.total)}</div><div class="sp-sub">POS ${fmtN(tikt.pos)} · Fin ${fmtN(tikt.financing)}</div></div>
        <div class="soc-pill"><div class="sp-label">Meta Ads</div><div class="sp-val" style="color:var(--purple)">${fmtN(meta.total)}</div><div class="sp-sub">POS ${fmtN(meta.pos)} · Fin ${fmtN(meta.financing)}</div></div>
      </div>
      <div class="g2">
        <div class="card">
          <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--blue)"></span>Platform Comparison</div></div>
          <div style="position:relative;height:260px"><canvas id="socBar" role="img" aria-label="Platforms"></canvas></div>
        </div>
        <div class="card">
          <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--amber)"></span>All Sources</div></div>
          ${sortedSrc.map(([s,c])=>`<div class="bar-row"><div class="bar-nm" title="${s}">${s}</div><div class="bar-tr"><div class="bar-fl" style="width:${Math.round(c/maxSrc*100)}%;background:${SRC_COLORS[s]||'#4a5568'}"></div></div><div class="bar-ct">${fmtN(c)}</div></div>`).join('')}
        </div>
      </div>`;
    setTimeout(()=>{
      const ctx=document.getElementById('socBar');
      if(ctx) charts.socBar=new Chart(ctx,{type:'bar',data:{labels:['Snapchat','TikTok','Meta Ads'],datasets:[{label:'POS',data:[snap.pos,tikt.pos,meta.pos],backgroundColor:'#3b82f6',borderRadius:5,stack:'s'},{label:'Financing',data:[snap.financing,tikt.financing,meta.financing],backgroundColor:'#0ea5e9',borderRadius:5,stack:'s'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8892a4',font:{size:11}}}},scales:{x:{ticks:{color:'#8892a4'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#8892a4'},grid:{color:'rgba(255,255,255,.04)'},stacked:true}}}});
    },50);
  }

  // ── LEAD STATES ──────────────────────────────────────────────────────────
  else if(activeSec==='states'){
    const rnr=['RNR1','RNR2','RNR3','RNR4','RNR5','RNR6'].reduce((s,k)=>s+(byState[k]?.total||0),0);
    document.getElementById('content').innerHTML=`
      <div class="kpis">
        <div class="kpi"><div class="kpi-accent" style="background:var(--purple)"></div><div class="k-lbl">New Lead</div><div class="k-val" style="color:var(--purple)">${fmtN(byState['New Lead']?.total)}</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--amber)"></div><div class="k-lbl">Pick Up</div><div class="k-val" style="color:var(--amber)">${fmtN(byState['Pick Up']?.total)}</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--teal)"></div><div class="k-lbl">Suc. Contacted</div><div class="k-val" style="color:var(--teal)">${fmtN(byState['Successfully Contacted']?.total)}</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--red)"></div><div class="k-lbl">RNR 1–6</div><div class="k-val" style="color:var(--red)">${fmtN(rnr)}</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--green)"></div><div class="k-lbl">Converted</div><div class="k-val" style="color:var(--green)">${fmtN(conv)}</div></div>
      </div>
      <div class="g2">
        <div class="card">
          <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--teal)"></span>State Breakdown</div></div>
          <div class="tbl-wrap"><table>
            <thead><tr><th>State</th><th>POS</th><th>Financing</th><th>Total</th><th>Share</th></tr></thead>
            <tbody>${STATES.map(st=>{const r=byState[st]||{pos:0,fin:0,total:0};if(!r.total)return'';const pct=total?Math.round(r.total/total*100):0;return`<tr><td><span class="badge ${bc(st)}">${st}</span></td>${cell(r.pos)}${cell(r.fin)}<td class="num" style="font-weight:600">${fmtN(r.total)}</td><td><div class="rate-wrap"><div class="rate-bar"><div class="rate-fill" style="width:${pct}%;background:var(--blue)"></div></div><span style="font-size:11px;color:var(--txt3);min-width:28px">${pct}%</span></div></td></tr>`;}).join('')}</tbody>
          </table></div>
        </div>
        <div class="card">
          <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--purple)"></span>States Chart</div></div>
          <div style="position:relative;height:320px"><canvas id="stChart" role="img" aria-label="States chart"></canvas></div>
        </div>
      </div>`;
    setTimeout(()=>{
      const ctx=document.getElementById('stChart');
      if(ctx){const lbs=STATES.filter(s=>(byState[s]?.total||0)>0);charts.stChart=new Chart(ctx,{type:'bar',indexAxis:'y',data:{labels:lbs,datasets:[{data:lbs.map(s=>byState[s]?.total||0),backgroundColor:'#3b82f6',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8892a4'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#8892a4',font:{size:11}},grid:{display:false}}}}});}
    },50);
  }

  // ── PIPELINE ─────────────────────────────────────────────────────────────
  else if(activeSec==='pipeline'){
    const activeStages=Object.entries(byStage).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    const cw=byStage['Closed Won']||0, cl=byStage['Closed Lost']||0;
    const active=activeStages.filter(([s])=>s!=='Closed Won'&&s!=='Closed Lost').reduce((s,[,v])=>s+v,0);
    document.getElementById('content').innerHTML=`
      <div class="kpis">
        <div class="kpi"><div class="kpi-accent" style="background:var(--blue)"></div><div class="k-lbl">Total Deals</div><div class="k-val" style="color:var(--blue)">${fmtN(d.dealsTotal)}</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--green)"></div><div class="k-lbl">Closed Won</div><div class="k-val" style="color:var(--green)">${fmtN(cw)}</div><div class="k-sub">${d.dealsTotal?Math.round(cw/d.dealsTotal*100):0}% win rate</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--red)"></div><div class="k-lbl">Closed Lost</div><div class="k-val" style="color:var(--red)">${fmtN(cl)}</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--amber)"></div><div class="k-lbl">Active Deals</div><div class="k-val" style="color:var(--amber)">${fmtN(active)}</div></div>
      </div>
      <div class="card" style="margin-bottom:14px">
        <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--amber)"></span>Pipeline Stages</div></div>
        <div class="pipe-grid">${activeStages.map(([s,v])=>`<div class="pipe-cell"><div class="pc-val" style="color:${PIPE_COLORS[s]||'#8892a4'}">${fmtN(v)}</div><div class="pc-lbl">${s}</div></div>`).join('')}</div>
      </div>
      <div class="card">
        <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--green)"></span>Pipeline Chart</div></div>
        <div style="position:relative;height:${Math.max(activeStages.length*38+80,260)}px"><canvas id="pipeChart" role="img" aria-label="Pipeline"></canvas></div>
      </div>`;
    setTimeout(()=>{
      const ctx=document.getElementById('pipeChart');
      if(ctx) charts.pipeChart=new Chart(ctx,{type:'bar',indexAxis:'y',data:{labels:activeStages.map(([s])=>s),datasets:[{data:activeStages.map(([,v])=>v),backgroundColor:activeStages.map(([s])=>PIPE_COLORS[s]||'#8892a4'),borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.parsed.x.toLocaleString()} deals`}}},scales:{x:{ticks:{color:'#8892a4'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#8892a4',font:{size:11}},grid:{display:false}}}}});
    },50);
  }

  // ── TEAM ─────────────────────────────────────────────────────────────────
  else if(activeSec==='team'){
    const ownerCount=Object.keys(d.byOwner||{}).length;
    document.getElementById('content').innerHTML=`
      <div class="kpis">
        <div class="kpi"><div class="kpi-accent" style="background:var(--blue)"></div><div class="k-lbl">Team Size</div><div class="k-val" style="color:var(--blue)">${ownerCount}</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--teal)"></div><div class="k-lbl">Avg / Rep</div><div class="k-val" style="color:var(--teal)">${ownerCount?Math.round(total/ownerCount):0}</div><div class="k-sub">leads</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--amber)"></div><div class="k-lbl">Top Performer</div><div class="k-val" style="font-size:15px;color:var(--amber)">${sortedOwners[0]?.[0]||'—'}</div><div class="k-sub">${fmtN(sortedOwners[0]?.[1]||0)} leads</div></div>
      </div>
      <div class="g2">
        <div class="card">
          <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--purple)"></span>Leads by Owner</div></div>
          ${sortedOwners.map(([nm,ct])=>`<div class="bar-row" style="margin-bottom:9px"><div class="bar-nm" style="min-width:145px;font-size:13px;color:var(--txt)">${nm}</div><div class="bar-tr" style="height:8px"><div class="bar-fl" style="width:${Math.round(ct/maxOwner*100)}%;background:#8b5cf6;height:8px"></div></div><div class="bar-ct">${fmtN(ct)}</div></div>`).join('')}
        </div>
        <div class="card">
          <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--blue)"></span>Team Distribution</div></div>
          <div style="position:relative;height:300px"><canvas id="teamChart" role="img" aria-label="Team"></canvas></div>
        </div>
      </div>`;
    setTimeout(()=>{
      const ctx=document.getElementById('teamChart');
      if(ctx) charts.teamChart=new Chart(ctx,{type:'doughnut',data:{labels:sortedOwners.map(([n])=>n),datasets:[{data:sortedOwners.map(([,v])=>v),backgroundColor:['#3b82f6','#0ea5e9','#8b5cf6','#f59e0b','#10b981','#f43f5e','#f97316','#ec4899','#06b6d4','#6366f1'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#8892a4',font:{size:11},boxWidth:10,padding:10}}},cutout:'58%'}});
    },50);
  }

  // ── TREND ────────────────────────────────────────────────────────────────
  else if(activeSec==='trend'){
    const monthly=d.monthly||{}, mkeys=Object.keys(monthly).sort(), last12=mkeys.slice(-12);
    const thisM=monthly[last12[last12.length-1]]?.total||0, lastM=monthly[last12[last12.length-2]]?.total||0;
    const best=Math.max(...last12.map(m=>monthly[m]?.total||0));
    document.getElementById('content').innerHTML=`
      <div class="kpis">
        <div class="kpi"><div class="kpi-accent" style="background:var(--blue)"></div><div class="k-lbl">This Month</div><div class="k-val" style="color:var(--blue)">${fmtN(thisM)}</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--teal)"></div><div class="k-lbl">Last Month</div><div class="k-val" style="color:var(--teal)">${fmtN(lastM)}</div></div>
        <div class="kpi"><div class="kpi-accent" style="background:var(--green)"></div><div class="k-lbl">Best Month</div><div class="k-val" style="color:var(--green)">${fmtN(best)}</div></div>
      </div>
      <div class="card">
        <div class="card-hd"><div class="card-title"><span class="dot" style="background:var(--blue)"></span>Monthly Lead Volume</div></div>
        <div style="position:relative;height:320px"><canvas id="trendChart" role="img" aria-label="Trend"></canvas></div>
      </div>`;
    setTimeout(()=>{
      const ctx=document.getElementById('trendChart');
      if(ctx) charts.trendChart=new Chart(ctx,{type:'bar',data:{labels:last12,datasets:[{label:'POS',data:last12.map(m=>monthly[m]?.pos||0),backgroundColor:'#3b82f6',borderRadius:4,stack:'s'},{label:'Financing',data:last12.map(m=>monthly[m]?.fin||0),backgroundColor:'#0ea5e9',borderRadius:4,stack:'s'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8892a4',font:{size:11}}}},scales:{x:{ticks:{color:'#8892a4'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#8892a4'},grid:{color:'rgba(255,255,255,.04)'},stacked:true}}}});
    },50);
  }
}

// Export to CSV
function exportCSV(){
  if(!CAMPS) return;
  let camps = CAMPS.campaigns||[];
  if(campFilter) camps = camps.filter(c=>c.name===campFilter);
  const allSources=[...new Set(camps.flatMap(c=>Object.keys(c.bySource||{})))].sort();
  const allStates=STATES.filter(st=>camps.some(c=>(c.byState||{})[st]>0));
  const headers=['Campaign','Total Leads','POS','Financing',...allSources,...allStates,'Converted (Deal)','Closed Won','Conv. Rate %'];
  const rows=camps.map(c=>[c.name,c.total,c.pos,c.financing,...allSources.map(s=>(c.bySource||{})[s]||0),...allStates.map(s=>(c.byState||{})[s]||0),c.dealsCreated||0,c.closedWon||0,c.closedWonRate||0]);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='campaigns_'+(campFilter||'all')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

loadData();
