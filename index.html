<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni — لوحة تقارير الليد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --bg2:       #161b27;
      --bg3:       #1e2535;
      --border:    rgba(255,255,255,.08);
      --border2:   rgba(255,255,255,.14);
      --text:      #e8eaf0;
      --text2:     #8b92a8;
      --text3:     #5a6075;
      --blue:      #3b82f6;
      --blue-d:    #1d4ed8;
      --teal:      #14b8a6;
      --amber:     #f59e0b;
      --green:     #22c55e;
      --red:       #ef4444;
      --purple:    #a78bfa;
      --snap:      #f5e642;
      --radius:    10px;
      --radius-lg: 14px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; right: 0;
      width: 220px; height: 100vh;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 24px 0;
      z-index: 100;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .dot {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--blue); display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600; color: #fff;
    }
    .sidebar-logo .name { font-size: 15px; font-weight: 600; color: var(--text); }
    .sidebar-logo .sub  { font-size: 11px; color: var(--text2); margin-top: 1px; }

    .nav { margin-top: 16px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; cursor: pointer;
      color: var(--text2); font-size: 13px;
      border-right: 3px solid transparent;
      transition: all .15s;
    }
    .nav-item:hover { color: var(--text); background: var(--bg3); }
    .nav-item.active { color: var(--blue); background: rgba(59,130,246,.08); border-right-color: var(--blue); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 20px 0;
      border-top: 1px solid var(--border);
    }
    .btn-refresh {
      width: 100%; padding: 9px;
      background: var(--blue); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 13px; font-family: inherit; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background .15s;
    }
    .btn-refresh:hover { background: var(--blue-d); }
    .last-update { font-size: 11px; color: var(--text3); text-align: center; margin-top: 8px; }

    /* ── Main ── */
    .main {
      margin-right: 220px;
      padding: 28px 28px 28px 28px;
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px; flex-wrap: wrap; gap: 12px;
    }
    .page-title { font-size: 20px; font-weight: 600; color: var(--text); }
    .page-sub   { font-size: 12px; color: var(--text2); margin-top: 3px; }

    /* ── Filters ── */
    .filters {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 10px 16px;
      margin-bottom: 22px;
    }
    .filter-label { font-size: 12px; color: var(--text2); }
    .filters select {
      font-size: 12px; padding: 6px 10px;
      border-radius: var(--radius); border: 1px solid var(--border2);
      background: var(--bg3); color: var(--text);
      font-family: inherit; cursor: pointer; outline: none;
    }
    .filters select:focus { border-color: var(--blue); }

    /* ── Metric Cards ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 22px;
    }
    .metric {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px 18px;
      position: relative; overflow: hidden;
    }
    .metric::before {
      content: ''; position: absolute; top: 0; right: 0;
      width: 3px; height: 100%; border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
    }
    .metric.blue::before   { background: var(--blue); }
    .metric.teal::before   { background: var(--teal); }
    .metric.amber::before  { background: var(--amber); }
    .metric.green::before  { background: var(--green); }
    .metric.red::before    { background: var(--red); }
    .metric.purple::before { background: var(--purple); }

    .metric .m-lbl  { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .metric .m-val  { font-size: 28px; font-weight: 600; }
    .metric .m-sub  { font-size: 11px; color: var(--text3); margin-top: 5px; }
    .metric.blue .m-val   { color: var(--blue); }
    .metric.teal .m-val   { color: var(--teal); }
    .metric.amber .m-val  { color: var(--amber); }
    .metric.green .m-val  { color: var(--green); }
    .metric.red .m-val    { color: var(--red); }
    .metric.purple .m-val { color: var(--purple); }

    /* ── Cards ── */
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
    }
    .card-title {
      font-size: 13px; font-weight: 600; color: var(--text);
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .card-title .dot-icon {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media(max-width:900px){ .grid2,.grid3 { grid-template-columns: 1fr; } }

    /* ── Social Mini Cards ── */
    .soc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .soc-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px; text-align: center;
    }
    .soc-card .sname { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
    .soc-card .sval  { font-size: 22px; font-weight: 600; }
    .soc-card .sdet  { font-size: 10px; color: var(--text3); margin-top: 4px; }

    /* ── Bar Chart ── */
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
    .bar-nm  { font-size: 12px; color: var(--text2); min-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-tr  { flex: 1; background: var(--bg3); border-radius: 3px; height: 8px; overflow: hidden; }
    .bar-fl  { height: 8px; border-radius: 3px; transition: width .4s ease; }
    .bar-ct  { font-size: 12px; color: var(--text); font-weight: 500; min-width: 40px; text-align: left; }

    /* ── Table ── */
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th {
      text-align: right; padding: 8px 10px;
      font-size: 11px; font-weight: 500; color: var(--text3);
      border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .05em;
    }
    .tbl td { padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: var(--bg3); }
    .tbl .num { text-align: left; font-weight: 500; font-variant-numeric: tabular-nums; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; }
    .b-new  { background: rgba(167,139,250,.15); color: var(--purple); }
    .b-pick { background: rgba(245,158,11,.15);  color: var(--amber); }
    .b-sc   { background: rgba(59,130,246,.15);  color: var(--blue); }
    .b-rnr  { background: rgba(139,146,168,.12); color: var(--text2); }
    .b-conv { background: rgba(34,197,94,.15);   color: var(--green); }
    .b-nc   { background: rgba(239,68,68,.15);   color: var(--red); }

    /* ── Pipeline ── */
    .pipe-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    @media(max-width:900px){ .pipe-grid { grid-template-columns: repeat(4,1fr); } }
    .pipe-cell {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 10px; text-align: center;
    }
    .pipe-cell .pv { font-size: 22px; font-weight: 600; }
    .pipe-cell .pl { font-size: 10px; color: var(--text2); margin-top: 4px; }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 60px; color: var(--text2); }
    .spin {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--border2); border-top-color: var(--blue);
      border-radius: 50%; animation: sp .7s linear infinite;
      vertical-align: middle; margin-left: 8px;
    }
    @keyframes sp { to { transform: rotate(360deg); } }
    .err { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: var(--radius); padding: 16px; color: var(--red); margin-bottom: 16px; }

    /* ── Legend ── */
    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; }
    .leg-i  { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .leg-d  { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Responsive sidebar ── */
    @media(max-width:700px){
      .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 12px; }
      .main { margin-right: 0; padding: 16px; }
      .nav { display: none; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="dot">O</div>
    <div>
      <div class="name">Omni CRM</div>
      <div class="sub">لوحة التقارير</div>
    </div>
  </div>

  <nav class="nav">
    <div class="nav-item active" onclick="showSection('overview')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      نظرة عامة
    </div>
    <div class="nav-item" onclick="showSection('social')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      المنصات
    </div>
    <div class="nav-item" onclick="showSection('states')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      الحالات
    </div>
    <div class="nav-item" onclick="showSection('pipeline')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      Pipeline
    </div>
    <div class="nav-item" onclick="showSection('team')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      الفريق
    </div>
  </nav>

  <div class="sidebar-footer">
    <button class="btn-refresh" onclick="loadStats()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      تحديث البيانات
    </button>
    <div class="last-update" id="lastUpdate">—</div>
  </div>
</aside>

<!-- Main Content -->
<main class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div>
      <div class="page-title" id="pageTitle">نظرة عامة</div>
      <div class="page-sub">Layout: Omni — Standard Pipeline</div>
    </div>
    <div class="filters">
      <span class="filter-label">فلتر:</span>
      <select id="fSrc" onchange="renderAll()">
        <option value="">كل المصادر</option>
        <option>Snapchat</option><option>TikTok</option><option>Meta Ads</option>
        <option>Referral</option><option>WhatsApp Ads</option><option>Omni Website</option>
        <option>Mowaridi</option><option>WhatsApp Organic</option><option>Facebook&Instagram</option>
      </select>
      <select id="fType" onchange="renderAll()">
        <option value="">POS + Financing</option>
        <option value="pos">POS فقط</option>
        <option value="fin">Financing فقط</option>
      </select>
      <select id="fOwner" onchange="renderAll()">
        <option value="">كل المندوبين</option>
      </select>
    </div>
  </div>

  <div id="error-box" style="display:none"></div>
  <div id="content"><div class="loading"><span class="spin"></span> جاري الاتصال بـ Zoho CRM...</div></div>

</main>

<script>
const BASE = "https://zoho-crm-proxy.onrender.com";
let RAW = null;
let charts = {};
let activeSection = 'overview';

const SRC_COLORS = {
  'Snapchat':'#f5e642','TikTok':'#3b82f6','Meta Ads':'#4267B2','Facebook&Instagram':'#4267B2',
  'META':'#4267B2','Referral':'#14b8a6','External Referral':'#14b8a6','Resellers':'#f59e0b',
  'WhatsApp Ads':'#22c55e','WhatsApp Organic':'#16a34a','Google Ads':'#ef4444',
  'Omni Website':'#a78bfa','Monshaat':'#fb923c','Mowaridi':'#f59e0b',
  'Omni Financing Awareness':'#818cf8','Inma Offer':'#f87171',
};
const PIPE_COLORS = {
  Qualified:'#3b82f6',Pitching:'#14b8a6',Negotiation:'#f59e0b',
  Nurturing:'#a78bfa',Commitment:'#f97316','Closed Won':'#22c55e','Closed Lost':'#ef4444'
};
const STATES = ['New Lead','Pick Up','Successfully Contacted','RNR1','RNR2','RNR3','RNR4','RNR5','RNR6','Converted','Not Converted'];
const STAGES = ['Qualified','Pitching','Negotiation','Nurturing','Commitment','Closed Won','Closed Lost'];

function badgeCls(s){
  if(s==='Converted') return 'b-conv';
  if(s==='Not Converted') return 'b-nc';
  if(s==='New Lead') return 'b-new';
  if(s==='Pick Up') return 'b-pick';
  if(s==='Successfully Contacted') return 'b-sc';
  return 'b-rnr';
}

function showSection(sec){
  activeSection = sec;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const titles = {overview:'نظرة عامة',social:'المنصات الاجتماعية',states:'حالات الليد',pipeline:'Pipeline',team:'الفريق'};
  document.getElementById('pageTitle').textContent = titles[sec]||sec;
  if(RAW) renderAll();
}

async function loadStats(){
  document.getElementById('content').innerHTML = '<div class="loading"><span class="spin"></span> جاري جلب البيانات من Zoho CRM...</div>';
  document.getElementById('error-box').style.display = 'none';
  try {
    const r = await fetch(BASE + '/stats');
    if(!r.ok) throw new Error('HTTP ' + r.status);
    RAW = await r.json();
    // populate owners
    const sel = document.getElementById('fOwner');
    const owners = Object.keys(RAW.byOwner||{}).sort((a,b)=>RAW.byOwner[b]-RAW.byOwner[a]);
    sel.innerHTML = '<option value="">كل المندوبين</option>' + owners.map(o=>`<option>${o}</option>`).join('');
    document.getElementById('lastUpdate').textContent = 'آخر تحديث: ' + new Date(RAW.generatedAt).toLocaleString('ar-SA');
    renderAll();
  } catch(e){
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-box').innerHTML = `<div class="err">⚠️ خطأ في الاتصال: ${e.message}</div>`;
    document.getElementById('content').innerHTML = '';
  }
}

function getFilterValues(){
  return {
    src: document.getElementById('fSrc').value,
    type: document.getElementById('fType').value,
    owner: document.getElementById('fOwner').value
  };
}

function renderAll(){
  if(!RAW) return;
  Object.values(charts).forEach(c=>c&&c.destroy&&c.destroy());
  charts = {};

  const {src, type, owner} = getFilterValues();

  let total = RAW.total, pos = RAW.pos, fin = RAW.financing;
  let conv = RAW.converted, nc = RAW.notConverted;
  let bySource = {...RAW.bySource};
  let byState  = JSON.parse(JSON.stringify(RAW.byState||{}));
  let byStage  = {...(RAW.byStage||{})};
  let byOwner  = {...(RAW.byOwner||{})};

  // approximate filtering on pre-aggregated stats
  if(src){
    const sv = bySource[src]||0;
    const ratio = RAW.total ? sv/RAW.total : 0;
    pos = Math.round(RAW.pos * ratio);
    fin = Math.round(RAW.financing * ratio);
    conv = Math.round(RAW.converted * ratio);
    nc   = Math.round(RAW.notConverted * ratio);
    total = sv;
    bySource = {[src]: sv};
    Object.keys(byState).forEach(s=>{
      byState[s] = {pos:Math.round(byState[s].pos*ratio), fin:Math.round(byState[s].fin*ratio), total:Math.round(byState[s].total*ratio)};
    });
  }
  if(type==='pos'){ fin=0; total=pos; conv=Math.round(RAW.converted*(RAW.pos/RAW.total||0)); nc=Math.round(RAW.notConverted*(RAW.pos/RAW.total||0)); }
  if(type==='fin'){ pos=0; total=fin; conv=Math.round(RAW.converted*(RAW.financing/RAW.total||0)); nc=Math.round(RAW.notConverted*(RAW.financing/RAW.total||0)); }
  if(owner){ total=byOwner[owner]||0; byOwner={[owner]:total}; }

  const sortedSrc = Object.entries(bySource).sort((a,b)=>b[1]-a[1]);
  const maxSrc = sortedSrc.length ? sortedSrc[0][1] : 1;
  const sortedOwners = Object.entries(byOwner).sort((a,b)=>b[1]-a[1]);
  const maxOwner = sortedOwners.length ? sortedOwners[0][1] : 1;

  const snap = RAW.social?.snapchat||{total:0,pos:0,financing:0};
  const tikt = RAW.social?.tiktok||{total:0,pos:0,financing:0};
  const meta = RAW.social?.meta||{total:0,pos:0,financing:0};

  // ── OVERVIEW ──────────────────────────────────────────────
  if(activeSection === 'overview'){
    document.getElementById('content').innerHTML = `
      <div class="metrics">
        <div class="metric blue">
          <div class="m-lbl">إجمالي الليدز</div>
          <div class="m-val">${total.toLocaleString()}</div>
          <div class="m-sub">Layout: Omni</div>
        </div>
        <div class="metric teal">
          <div class="m-lbl">POS</div>
          <div class="m-val">${pos.toLocaleString()}</div>
          <div class="m-sub">${total?Math.round(pos/total*100):0}% من الإجمالي</div>
        </div>
        <div class="metric amber">
          <div class="m-lbl">Financing</div>
          <div class="m-val">${fin.toLocaleString()}</div>
          <div class="m-sub">${total?Math.round(fin/total*100):0}% من الإجمالي</div>
        </div>
        <div class="metric green">
          <div class="m-lbl">Converted</div>
          <div class="m-val">${conv.toLocaleString()}</div>
          <div class="m-sub">معدل ${total?Math.round(conv/total*100):0}%</div>
        </div>
        <div class="metric red">
          <div class="m-lbl">Not Converted</div>
          <div class="m-val">${nc.toLocaleString()}</div>
          <div class="m-sub">${total?Math.round(nc/total*100):0}% من الإجمالي</div>
        </div>
      </div>

      <div class="grid2">
        <div class="card">
          <div class="card-title"><span class="dot-icon" style="background:var(--blue)"></span>توزيع POS مقابل Financing</div>
          <div class="legend">
            <div class="leg-i"><div class="leg-d" style="background:var(--blue)"></div>POS (${pos.toLocaleString()})</div>
            <div class="leg-i"><div class="leg-d" style="background:var(--teal)"></div>Financing (${fin.toLocaleString()})</div>
          </div>
          <div style="position:relative;height:220px">
            <canvas id="donutChart" role="img" aria-label="POS ${pos} Financing ${fin}">POS: ${pos}، Financing: ${fin}</canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title"><span class="dot-icon" style="background:var(--amber)"></span>أبرز المصادر</div>
          ${sortedSrc.slice(0,8).map(([s,c])=>`
            <div class="bar-row">
              <div class="bar-nm" title="${s}">${s}</div>
              <div class="bar-tr"><div class="bar-fl" style="width:${Math.round(c/maxSrc*100)}%;background:${SRC_COLORS[s]||'#8b92a8'}"></div></div>
              <div class="bar-ct">${c.toLocaleString()}</div>
            </div>`).join('')}
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="dot-icon" style="background:var(--purple)"></span>ملخص الحالات</div>
        <table class="tbl">
          <thead><tr><th>الحالة</th><th>POS</th><th>Financing</th><th>المجموع</th></tr></thead>
          <tbody>
            ${STATES.map(st=>{
              const d = byState[st]||{pos:0,fin:0,total:0};
              if(d.total===0) return '';
              if(type==='pos'&&d.pos===0) return '';
              if(type==='fin'&&d.fin===0) return '';
              return `<tr>
                <td><span class="badge ${badgeCls(st)}">${st}</span></td>
                <td class="num">${type==='fin'?'—':d.pos.toLocaleString()}</td>
                <td class="num">${type==='pos'?'—':d.fin.toLocaleString()}</td>
                <td class="num" style="font-weight:600">${(type==='pos'?d.pos:type==='fin'?d.fin:d.total).toLocaleString()}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
    // donut
    setTimeout(()=>{
      const ctx = document.getElementById('donutChart');
      if(ctx&&(pos>0||fin>0)){
        charts.donut = new Chart(ctx,{
          type:'doughnut',
          data:{labels:['POS','Financing'],datasets:[{data:[pos,fin],backgroundColor:['#3b82f6','#14b8a6'],borderWidth:0}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed.toLocaleString()}`}}},cutout:'68%'}
        });
      }
    },50);
  }

  // ── SOCIAL ────────────────────────────────────────────────
  else if(activeSection === 'social'){
    document.getElementById('content').innerHTML = `
      <div class="metrics">
        <div class="metric" style="--c:var(--snap)">
          <div class="m-lbl">Snapchat</div>
          <div class="m-val" style="color:var(--snap)">${snap.total.toLocaleString()}</div>
          <div class="m-sub">POS: ${snap.pos} | Financing: ${snap.financing}</div>
        </div>
        <div class="metric blue">
          <div class="m-lbl">TikTok</div>
          <div class="m-val">${tikt.total.toLocaleString()}</div>
          <div class="m-sub">POS: ${tikt.pos} | Financing: ${tikt.financing}</div>
        </div>
        <div class="metric purple">
          <div class="m-lbl">Meta Ads</div>
          <div class="m-val">${meta.total.toLocaleString()}</div>
          <div class="m-sub">POS: ${meta.pos} | Financing: ${meta.financing}</div>
        </div>
        <div class="metric teal">
          <div class="m-lbl">إجمالي السوشيال</div>
          <div class="m-val">${(snap.total+tikt.total+meta.total).toLocaleString()}</div>
          <div class="m-sub">${RAW.total?Math.round((snap.total+tikt.total+meta.total)/RAW.total*100):0}% من الكل</div>
        </div>
      </div>
      <div class="grid2">
        <div class="card">
          <div class="card-title"><span class="dot-icon" style="background:var(--blue)"></span>مقارنة المنصات</div>
          <div style="position:relative;height:260px">
            <canvas id="socialBar" role="img" aria-label="مقارنة منصات السوشيال">بيانات المنصات</canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title"><span class="dot-icon" style="background:var(--amber)"></span>كل المصادر</div>
          ${sortedSrc.map(([s,c])=>`
            <div class="bar-row">
              <div class="bar-nm" title="${s}">${s}</div>
              <div class="bar-tr"><div class="bar-fl" style="width:${Math.round(c/maxSrc*100)}%;background:${SRC_COLORS[s]||'#8b92a8'}"></div></div>
              <div class="bar-ct">${c.toLocaleString()}</div>
            </div>`).join('')}
        </div>
      </div>
    `;
    setTimeout(()=>{
      const ctx = document.getElementById('socialBar');
      if(ctx){
        charts.socialBar = new Chart(ctx,{
          type:'bar',
          data:{
            labels:['Snapchat','TikTok','Meta Ads'],
            datasets:[
              {label:'POS',data:[snap.pos,tikt.pos,meta.pos],backgroundColor:'#3b82f6',borderRadius:5},
              {label:'Financing',data:[snap.financing,tikt.financing,meta.financing],backgroundColor:'#14b8a6',borderRadius:5}
            ]
          },
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b92a8',font:{size:12}}}},scales:{x:{ticks:{color:'#8b92a8'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#8b92a8'},grid:{color:'rgba(255,255,255,.04)'}}}}
        });
      }
    },50);
  }

  // ── STATES ────────────────────────────────────────────────
  else if(activeSection === 'states'){
    const rnrTotal = ['RNR1','RNR2','RNR3','RNR4','RNR5','RNR6'].reduce((s,k)=>(byState[k]?s+byState[k].total:s),0);
    document.getElementById('content').innerHTML = `
      <div class="metrics">
        <div class="metric blue"><div class="m-lbl">New Lead</div><div class="m-val">${(byState['New Lead']?.total||0).toLocaleString()}</div></div>
        <div class="metric amber"><div class="m-lbl">Pick Up</div><div class="m-val">${(byState['Pick Up']?.total||0).toLocaleString()}</div></div>
        <div class="metric teal"><div class="m-lbl">Successfully Contacted</div><div class="m-val">${(byState['Successfully Contacted']?.total||0).toLocaleString()}</div></div>
        <div class="metric red"><div class="m-lbl">RNR (1-6)</div><div class="m-val">${rnrTotal.toLocaleString()}</div></div>
        <div class="metric green"><div class="m-lbl">Converted</div><div class="m-val">${conv.toLocaleString()}</div></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="dot-icon" style="background:var(--teal)"></span>تفصيل كامل لكل الحالات</div>
        <table class="tbl">
          <thead><tr><th>الحالة</th><th>POS</th><th>Financing</th><th>المجموع</th><th>النسبة</th></tr></thead>
          <tbody>
            ${STATES.map(st=>{
              const d = byState[st]||{pos:0,fin:0,total:0};
              if(d.total===0) return '';
              const pct = total ? Math.round(d.total/total*100) : 0;
              return `<tr>
                <td><span class="badge ${badgeCls(st)}">${st}</span></td>
                <td class="num">${d.pos.toLocaleString()}</td>
                <td class="num">${d.fin.toLocaleString()}</td>
                <td class="num" style="font-weight:600">${d.total.toLocaleString()}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px">
                    <div style="flex:1;background:var(--bg3);border-radius:3px;height:6px;overflow:hidden">
                      <div style="width:${pct}%;height:6px;border-radius:3px;background:var(--blue)"></div>
                    </div>
                    <span style="font-size:11px;color:var(--text2);min-width:28px">${pct}%</span>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  // ── PIPELINE ──────────────────────────────────────────────
  else if(activeSection === 'pipeline'){
    document.getElementById('content').innerHTML = `
      <div class="card" style="margin-bottom:16px">
        <div class="card-title"><span class="dot-icon" style="background:var(--amber)"></span>Standard Pipeline — توزيع الليدز</div>
        <div class="pipe-grid">
          ${STAGES.map(st=>`
            <div class="pipe-cell">
              <div class="pv" style="color:${PIPE_COLORS[st]}">${(RAW.byStage?.[st]||0).toLocaleString()}</div>
              <div class="pl">${st}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-title"><span class="dot-icon" style="background:var(--green)"></span>مخطط Pipeline</div>
        <div style="position:relative;height:300px">
          <canvas id="pipeChart" role="img" aria-label="مخطط Pipeline">بيانات Pipeline</canvas>
        </div>
      </div>
    `;
    setTimeout(()=>{
      const ctx = document.getElementById('pipeChart');
      if(ctx){
        const vals = STAGES.map(s=>RAW.byStage?.[s]||0);
        const bgColors = STAGES.map(s=>PIPE_COLORS[s]);
        charts.pipe = new Chart(ctx,{
          type:'bar',
          data:{labels:STAGES,datasets:[{label:'عدد الليدز',data:vals,backgroundColor:bgColors,borderRadius:6}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.parsed.y.toLocaleString()} ليد`}}},scales:{x:{ticks:{color:'#8b92a8',font:{size:11}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#8b92a8'},grid:{color:'rgba(255,255,255,.04)'}}}}
        });
      }
    },50);
  }

  // ── TEAM ──────────────────────────────────────────────────
  else if(activeSection === 'team'){
    document.getElementById('content').innerHTML = `
      <div class="metrics">
        <div class="metric blue"><div class="m-lbl">عدد المندوبين</div><div class="m-val">${Object.keys(RAW.byOwner||{}).length}</div></div>
        <div class="metric teal"><div class="m-lbl">متوسط الليدز/مندوب</div><div class="m-val">${Object.keys(RAW.byOwner||{}).length?Math.round(RAW.total/Object.keys(RAW.byOwner).length):0}</div></div>
        <div class="metric amber"><div class="m-lbl">الأعلى أداءً</div><div class="m-val" style="font-size:14px">${sortedOwners[0]?.[0]||'—'}</div><div class="m-sub">${sortedOwners[0]?.[1]?.toLocaleString()||0} ليد</div></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="dot-icon" style="background:var(--purple)"></span>توزيع الليدز بالمندوبين</div>
        ${sortedOwners.map(([nm,ct])=>`
          <div class="bar-row" style="margin-bottom:10px">
            <div class="bar-nm" style="min-width:160px;font-size:13px;color:var(--text)" title="${nm}">${nm}</div>
            <div class="bar-tr" style="height:10px"><div class="bar-fl" style="width:${Math.round(ct/maxOwner*100)}%;background:#a78bfa;height:10px"></div></div>
            <div class="bar-ct" style="font-size:13px">${ct.toLocaleString()}</div>
          </div>`).join('')}
      </div>
    `;
  }
}

// Start
loadStats();
</script>
</body>
</html>
